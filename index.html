<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #667eea; }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover { background: #5a67d8; }

    .summary {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #f0f0f0;
      animation: slideIn 0.2s ease;
    }

    li:last-child { border-bottom: none; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      transition: color 0.2s, text-decoration 0.2s;
    }

    li.checked .item-text {
      color: #a0aec0;
      text-decoration: line-through;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }

    .delete-btn:hover { color: #e53e3e; background: #fff5f5; }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      color: #718096;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .clear-btn:hover { background: #fff5f5; color: #e53e3e; border-color: #fed7d7; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input id="itemInput" type="text" placeholder="아이템 입력..." maxlength="60">
      <button onclick="addItem()">+</button>
    </div>

    <div class="summary" id="summary"></div>
    <ul id="list"></ul>
    <div class="empty" id="empty">리스트가 비어 있어요.</div>

    <button class="clear-btn" onclick="clearChecked()">완료 항목 삭제</button>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping') || '[]');

    const input   = document.getElementById('itemInput');
    const list    = document.getElementById('list');
    const empty   = document.getElementById('empty');
    const summary = document.getElementById('summary');

    function save() {
      localStorage.setItem('shopping', JSON.stringify(items));
    }

    function render() {
      list.innerHTML = '';
      items.forEach((item, i) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        li.innerHTML = `
          <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggle(${i})">
          <span class="item-text">${escHtml(item.text)}</span>
          <button class="delete-btn" onclick="remove(${i})" title="삭제">✕</button>
        `;
        list.appendChild(li);
      });

      empty.style.display = items.length === 0 ? 'block' : 'none';

      const done  = items.filter(x => x.checked).length;
      const total = items.length;
      summary.textContent = total > 0 ? `${done} / ${total} 완료` : '';
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) { input.focus(); return; }
      items.unshift({ text, checked: false });
      input.value = '';
      input.focus();
      save();
      render();
    }

    function toggle(i) {
      items[i].checked = !items[i].checked;
      save();
      render();
    }

    function remove(i) {
      items.splice(i, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(x => !x.checked);
      save();
      render();
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    render();
  </script>
</body>
</html>
